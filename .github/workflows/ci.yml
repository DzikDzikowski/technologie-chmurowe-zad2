name: CI/CD Pipeline Zadanie 2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Konfiguracja QEMU
        uses: docker/setup-qemu-action@v3

      - name: Konfiguracja Buildx
        uses: docker/setup-buildx-action@v3

      - name: Logowanie do DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Logowanie do GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata dla GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zadanie2-pogoda
          tags: |
            type=sha,priority=100,prefix=sha-,format=short
            type=raw,value=latest

      - name: Budowa obrazu testowego
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: local-test-image:latest

      - name: Test CVE (Trivy)
        uses: aquasec/trivy-action@master
        with:
          image-ref: 'local-test-image:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore'

      - name: Budowa wieloarchitekturowa i Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/zadanie2-cache:cache,mode=max
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/zadanie2-cache:cache